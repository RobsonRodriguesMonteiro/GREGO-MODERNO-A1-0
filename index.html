<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#1b3a5b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>Ελληνικά — Aprender Grego Moderno (A1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== Paleta liquid-glass (azul / turquesa / verde, sem roxo) ===== */
        :root {
            --marble: #f5f5f7;
            --marble2: #eef2f7;
            --ink: #1d1d1f;
            --aegean: #0066cc;
            --aegean-deep: #005bb5;
            /* azul Apple */
            --terra: #0d9488;
            --gold: #14b8a6;
            /* turquesa */
            --olive: #14b8a6;
            /* teal (sucesso/realce) */
            --muted: #86868b;
            /* texto secundário */
            --line: rgba(0, 102, 204, .16);
        }

        * {
            -webkit-tap-highlight-color: transparent;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        html, body {
            overscroll-behavior-y: none;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overflow-x: hidden;
            color: var(--ink);
            background-color: #f5f5f7;
            background-image:
            radial-gradient(at 20% 0%, hsla(212, 100%, 85%, 0.9) 0px, transparent 50%), radial-gradient(at 80% 10%, hsla(195, 100%, 86%, 0.8) 0px, transparent 50%), radial-gradient(at 90% 90%, hsla(162, 85%, 84%, 0.85) 0px, transparent 50%), radial-gradient(at 10% 90%, hsla(205, 100%, 86%, 0.8) 0px, transparent 50%), radial-gradient(at 50% 50%, hsla(200, 100%, 92%, 0.6) 0px, transparent 60%);
            background-size: 200% 200%;
            animation: tahoeShift 25s ease-in-out infinite alternate;
        }

        @keyframes tahoeShift {
            0% {
                background-position:0% 0%
            }

            50% {
                background-position:100% 100%
            }

            100% {
                background-position: 0% 0%
            }
        }

        .font-greek {
            font-family: 'Manrope', 'Sora', sans-serif;
            font-weight: 700;
            letter-spacing: -.01em;
        }

        .font-display {
            font-family: 'Sora', 'Manrope', sans-serif;
            letter-spacing: -.02em;
        }/* ===== Padrões gregos ===== *//* Meandro (Greek key) — dourado luminoso */

        .meander-top, .meander-bottom {
            height: 12px;
            width: 100%;
            background-image: url("data:image/svg+xml;utf8,
            
        <svg xmlns='http://www.w3.org/2000/svg' width='48' height='14' viewBox='0 0 48 14'>
            <g fill='none' stroke='%232563eb' stroke-width='1.4' opacity='0.4'>
                <path d='M0 13 H6 V4 H18 V10 H12 V8 M18 4 H24 V13 M24 1 H42 V13'/>
            </g>
        </svg>
        ");
          background-repeat:repeat-x; background-size:auto 12px;
        }
        .meander-bottom{ transform:scaleY(-1); }
        .col-line{ width:14px; background-image:url("data:image/svg+xml;utf8,
        
        <svg xmlns='http://www.w3.org/2000/svg' width='14' height='48' viewBox='0 0 14 48'>
            <g fill='none' stroke='%230ea5a0' stroke-width='1.4' opacity='0.45'>
                <path d='M13 0 V6 H4 V18 H10 V12 H8 M4 18 V24 H13 M1 24 V42 H13'/>
            </g>
        </svg>
        "); background-repeat:repeat-y; }
        /* Kyma — onda corrente (Vitruvian wave), bem discreta */
        .kyma{ height:16px; width:100%; background-repeat:repeat-x; background-size:auto 16px; opacity:.55;
          background-image:url("data:image/svg+xml;utf8,
        
        <svg xmlns='http://www.w3.org/2000/svg' width='60' height='18' viewBox='0 0 60 18'>
            <path d='M2 16 C2 4 18 4 18 12 C18 18 8 18 10 11 M32 16 C32 4 48 4 48 12 C48 18 38 18 40 11' fill='none' stroke='%232563eb' stroke-width='1.4' opacity='0.45'/>
        </svg>
        "); }
        .eggdart{ height:16px; width:100%; background-repeat:repeat-x; background-size:auto 16px; opacity:.45;
          background-image:url("data:image/svg+xml;utf8,
        
        <svg xmlns='http://www.w3.org/2000/svg' width='40' height='16' viewBox='0 0 40 16'>
            <g fill='none' stroke='%2310b8a6' stroke-width='1.3' opacity='0.6'>
                <ellipse cx='10' cy='8' rx='6' ry='5'/>
                <path d='M19 2 L21 8 L19 14'/>
                <ellipse cx='30' cy='8' rx='6' ry='5'/>
            </g>
        </svg>
        "); }
        /* Textura grega muito sutil para o vidro */
        .tex-cross{ background-image:url("data:image/svg+xml;utf8,
        
        <svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
            <g fill='none' stroke='%232563eb' stroke-width='1' opacity='0.05'>
                <path d='M20 12 V28 M12 20 H28'/>
            </g>
        </svg>
        "); }
        @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        .animate-fade-in{ animation:fadeIn .4s ease-out forwards; }
        /* ===== Tiles / cards ===== */
        .app-icon{ border-radius:22.5%; box-shadow:0 15px 30px rgba(0,0,0,.1), inset 0 1px 1px rgba(255,255,255,.9), inset 0 -1px 2px rgba(0,0,0,.1); transition:all .3s ease; }
        .app-icon:active{ transform:scale(.95); }
        /* ===== Liquid glass (estilo Apple) — vidro fosco branco ===== */
        .glass-folder-icon, .tile{
          background:linear-gradient(135deg, rgba(255,255,255,.7) 0%, rgba(255,255,255,.3) 100%);
          -webkit-backdrop-filter:blur(20px) saturate(180%); backdrop-filter:blur(20px) saturate(180%);
          border:2px solid rgba(255,255,255,.8);
        }
        .folder-overlay{ background:rgba(255,255,255,.15); -webkit-backdrop-filter:blur(50px) saturate(200%); backdrop-filter:blur(50px) saturate(200%); }
        .folder-container{ background:rgba(255,255,255,.4); border-radius:40px; padding:5%; border:1px solid rgba(255,255,255,.6); box-shadow:0 32px 64px rgba(0,0,0,.1), inset 0 1px 2px rgba(255,255,255,1); max-height:90vh; overflow-y:auto; }
        .lesson-card{ background:linear-gradient(135deg, rgba(255,255,255,.6), rgba(255,255,255,.2)); -webkit-backdrop-filter:blur(30px); backdrop-filter:blur(30px); border:1px solid rgba(255,255,255,.8); border-radius:28px; padding:24px; cursor:pointer; transition:all .3s cubic-bezier(.25,1,.5,1); box-shadow:0 10px 30px rgba(0,0,0,.05), inset 0 1px 1px rgba(255,255,255,1); }
        .lesson-card:hover{ transform:translateY(-4px) scale(1.02); background:linear-gradient(135deg, rgba(255,255,255,.85), rgba(255,255,255,.45)); box-shadow:0 20px 40px rgba(0,0,0,.1), inset 0 1px 1px rgba(255,255,255,1); }
        .glass-panel{ background:linear-gradient(135deg, rgba(255,255,255,.6) 0%, rgba(255,255,255,.3) 100%); -webkit-backdrop-filter:blur(48px) saturate(200%); backdrop-filter:blur(48px) saturate(200%); }
        .glass-inner{ background:linear-gradient(135deg, rgba(255,255,255,.45) 0%, rgba(255,255,255,.2) 100%); -webkit-backdrop-filter:blur(24px) saturate(180%); backdrop-filter:blur(24px) saturate(180%); box-shadow:0 8px 32px rgba(0,0,0,.04), inset 0 1px 1px rgba(255,255,255,.8); transition:all .3s; }
        .glass-inner:hover{ transform:translateY(-2px); background:rgba(255,255,255,.6); box-shadow:0 15px 30px rgba(0,0,0,.08), inset 0 1px 1px rgba(255,255,255,.8); }
        .mode-tab{ transition:all .3s ease; border:1px solid transparent; color:var(--ink); }
        .mode-tab:hover{ background:rgba(255,255,255,.45); }
        .mode-tab.active{ background:rgba(255,255,255,.85); color:var(--aegean); box-shadow:0 4px 12px rgba(0,0,0,.05), inset 0 1px 1px rgba(255,255,255,1); border:1px solid rgba(255,255,255,.9); }
        .custom-scrollbar::-webkit-scrollbar{ width:6px; height:6px; }
        .custom-scrollbar::-webkit-scrollbar-track{ background:transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb{ background:rgba(0,0,0,.15); border-radius:10px; }
        .vocab-icon{ width:56px; height:56px; border-radius:18px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, rgba(0,102,204,.14), rgba(51,136,255,.22)); border:1px solid rgba(255,255,255,.85); color:var(--aegean); box-shadow:0 6px 16px rgba(0,102,204,.12), inset 0 1px 1px rgba(255,255,255,.9); }
        .rom{ color:var(--terra); font-style:italic; font-weight:700; }
        .practice-icon-xl{ width:160px; height:160px; border-radius:40px; display:flex; align-items:center; justify-content:center; margin:0 auto; background:linear-gradient(135deg,#0066cc,#3388ff); color:#fff; box-shadow:0 18px 40px rgba(0,102,204,.32); border:1px solid rgba(255,255,255,.4); }
        /* ===== Práctica ===== */
        .practice-btn{ background:linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,.6)); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.8); box-shadow:0 8px 20px rgba(0,0,0,.05), inset 0 1px 1px rgba(255,255,255,1); transition:all .2s cubic-bezier(.25,1,.5,1); }
        .practice-btn:active:not(:disabled){ transform:scale(.96); }
        .practice-btn-primary{ background:linear-gradient(135deg, #0066cc, #005bb5); color:#fff; border:none; box-shadow:0 8px 20px rgba(0,102,204,.3); }
        .practice-btn-primary:hover:not(:disabled){ box-shadow:0 12px 25px rgba(0,102,204,.4); transform:translateY(-2px); }
        .practice-btn-success{ background:linear-gradient(135deg,#14b8a6,#0d9488); color:#fff; border:none; box-shadow:0 8px 20px rgba(20,184,166,.3); }
        .practice-btn-success:hover:not(:disabled){ box-shadow:0 12px 25px rgba(20,184,166,.4); transform:translateY(-2px); }
        .practice-btn-danger{ background:linear-gradient(135deg,#f43f5e,#e11d48); color:#fff; border:none; box-shadow:0 8px 20px rgba(244,63,94,.3); }
        .practice-btn:disabled{ background:rgba(255,255,255,.6); color:rgba(0,0,0,.3); box-shadow:none; border-color:rgba(255,255,255,.4); cursor:not-allowed; transform:none; }
        .practice-card{ background:linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,.5)); -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.8); box-shadow:0 8px 20px rgba(0,0,0,.04), inset 0 1px 1px rgba(255,255,255,1); transition:all .2s cubic-bezier(.25,1,.5,1); cursor:pointer; }
        .practice-card:hover{ transform:translateY(-2px); box-shadow:0 12px 25px rgba(0,0,0,.08), inset 0 1px 1px rgba(255,255,255,1); }
        .practice-card.selected{ border-color:#0066cc; background:rgba(0,102,204,.05); box-shadow:0 0 0 2px rgba(0,102,204,.2); transform:scale(.98); }
        .practice-card.matched{ opacity:0; pointer-events:none; transform:scale(.9); }
        .practice-card.error{ border-color:#f43f5e; background:rgba(244,63,94,.05); animation:shake .4s; }
        .practice-card.correct{ border-color:#14b8a6; background:rgba(20,184,166,.08); }
        .word-block{ background:rgba(255,255,255,.9); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,1); box-shadow:0 4px 12px rgba(0,0,0,.05); cursor:pointer; transition:all .2s; }
        .word-block:hover{ transform:translateY(-2px); box-shadow:0 6px 15px rgba(0,0,0,.08); }
        .word-block.used{ background:rgba(0,0,0,.04); color:transparent; box-shadow:inset 0 2px 4px rgba(0,0,0,.05); pointer-events:none; border-color:transparent; }
        .drop-zone{ min-height:4rem; border-bottom:2px dashed rgba(148,163,184,.5); padding-bottom:.5rem; }
        .mem-card{ position:relative; height:5.5rem; border-radius:1rem; cursor:pointer; transform-style:preserve-3d; transition:transform .4s; }
        .mem-card.flipped{ transform:rotateY(180deg); }
        .mem-face{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; border-radius:1rem; backface-visibility:hidden; padding:.5rem; text-align:center; font-weight:700; }
        .mem-back{ background:linear-gradient(135deg,#0066cc,#3388ff); color:#fff; box-shadow:0 8px 20px rgba(0,102,204,.25); }
        .mem-front{ background:rgba(255,255,255,.95); border:1px solid rgba(255,255,255,1); color:var(--ink); transform:rotateY(180deg); box-shadow:0 6px 16px rgba(0,0,0,.06); font-size:.9rem; line-height:1.1; }
        .mem-card.done .mem-front{ background:rgba(20,184,166,.15); border-color:#14b8a6; }
        @keyframes shake{ 0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)} }
        @keyframes slideUp{ from{transform:translateY(100%); opacity:0;} to{transform:translateY(0); opacity:1;} }
        .slide-up{ animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards; }
        .fund-card{ background:linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,.25)); -webkit-backdrop-filter:blur(24px) saturate(180%); backdrop-filter:blur(24px) saturate(180%); border:1px solid rgba(255,255,255,.8); border-radius:24px; box-shadow:0 8px 32px rgba(0,0,0,.04), inset 0 1px 1px rgba(255,255,255,.9); }
        .letter-cell{ background:linear-gradient(135deg, rgba(255,255,255,.6), rgba(255,255,255,.28)); -webkit-backdrop-filter:blur(18px) saturate(170%); backdrop-filter:blur(18px) saturate(170%); border:1px solid rgba(255,255,255,.8); border-radius:18px; transition:all .2s; }
        .letter-cell:hover{ transform:translateY(-3px); background:rgba(255,255,255,.7); box-shadow:0 12px 26px rgba(0,0,0,.08); }
        .badge-soft{ background:rgba(255,255,255,.6); color:var(--aegean); border:1px solid rgba(255,255,255,.85); }
        
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="flex items-center justify-center min-h-[100dvh] w-full relative"></div>

    <!-- ===== MODO PRÁTICA ===== -->
    <div id="practiceModal" class="fixed inset-0 z-[100] hidden flex-col font-sans" style="background:rgba(245,245,247,.8); -webkit-backdrop-filter:blur(24px) saturate(150%); backdrop-filter:blur(24px) saturate(150%);">
        <div class="flex items-center p-4 md:px-8 max-w-4xl mx-auto w-full pt-6 md:pt-8">
            <button onclick="closePractice()" class="text-slate-400 hover:text-slate-600 transition p-2 bg-white/60 rounded-full shadow-sm border border-white">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="flex-1 mx-6 h-3 rounded-full overflow-hidden shadow-inner border border-white/50" style="background:rgba(148,163,184,.25)">
                <div id="practiceProgress" class="h-full w-0 transition-all duration-500 rounded-full" style="background:linear-gradient(90deg,#2dd4bf,#3b82f6); box-shadow:0 0 10px rgba(45,212,191,.5)"></div>
            </div>
            <div class="font-bold text-xl flex items-center gap-1.5" style="color:#f43f5e">
                <i data-lucide="heart" class="w-6 h-6" style="fill:#f43f5e"></i>
                <span id="heartsCount">5</span>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-4 py-6 flex flex-col items-center max-w-3xl mx-auto w-full custom-scrollbar">
            <h2 id="activityTitle" class="text-2xl md:text-3xl font-extrabold mb-8 self-start w-full tracking-tight" style="color:var(--aegean-deep)">…</h2>
            <div id="activityContainer" class="w-full flex flex-col items-center gap-6"></div>
        </div>
        <div id="practiceFooter" class="border-t p-4 md:p-6 relative z-10 transition-colors duration-300" style="border-color:var(--line); background:rgba(255,255,255,.55); -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); box-shadow:0 -10px 40px rgba(22,59,90,.06)">
            <div class="max-w-4xl mx-auto flex justify-between items-center gap-4">
                <div id="feedbackArea" class="hidden absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up">
                    <div class="max-w-4xl mx-auto w-full flex items-center gap-5">
                        <div id="feedbackIcon" class="w-14 h-14 rounded-full flex items-center justify-center text-white shadow-md shrink-0"></div>
                        <div>
                            <h3 id="feedbackTitle" class="text-2xl font-extrabold tracking-tight">Σωστά!</h3>
                            <p id="feedbackText" class="text-base md:text-lg font-medium opacity-90 mt-1 hidden"></p>
                        </div>
                    </div>
                </div>
                <button id="btnSkip" onclick="skipActivity()" class="practice-btn text-slate-500 font-bold uppercase tracking-wider py-3.5 px-6 rounded-2xl flex-shrink-0 hover:text-slate-700">Pular</button>
                <button id="btnCheck" onclick="checkAnswer()" class="practice-btn practice-btn-primary font-bold uppercase tracking-wider py-3.5 px-8 rounded-2xl w-full md:w-auto md:min-w-[160px]" disabled>Verificar</button>
            </div>
        </div>
    </div>

    <script>
    // =====================================================================
    //  ΕΛΛΗΝΙΚΑ A1 — Aprender Grego Moderno através do Português
    //  Estrutura: courseData (unidades > lições > categorias) + Fundamentos
    //  Cada item: { gr (grego), rom (romanização/leitura), pt (português) }
    //  Verbos podem ter "c" = conjugação no presente (com pronomes).
    //  Lições podem ter "phrases" = frases para a prática.
    // =====================================================================
    const courseData = [];
    const GP = ['εγώ', 'εσύ', 'αυτός/ή/ό', 'εμείς', 'εσείς', 'αυτοί/ές/ά'];
    // Conjugador automático do presente (verbos regulares -ω / -άω / -ώ)
    function grConj(gr) {
        let s = (gr || '').trim();
        let forms;
        if (/άω$/.test(s)) {
            let r = s.slice(0, -2);
            forms = [r + 'άω', r + 'άς', r + 'άει', r + 'άμε', r + 'άτε', r + 'άνε'];
        }
        else if (/ώ$/.test(s)) {
            let r = s.slice(0, -1);
            forms = [r + 'ώ', r + 'άς', r + 'ά', r + 'ούμε', r + 'άτε', r + 'ούν'];
        }
        else if (/ω$/.test(s)) {
            let r = s.slice(0, -1);
            forms = [r + 'ω', r + 'εις', r + 'ει', r + 'ουμε', r + 'ετε', r + 'ουν'];
        }
        else {
            forms = [s, s, s, s, s, s];
        }
        return forms.map((f, i) => GP[i] + ' ' + f);
    }
    // ===================== UNIT 1 =====================
    courseData.push({
        id: 1,
        title: "Ενότητα 1",
        subtitle: "Ταυτότητα & Χαιρετισμοί",
        colors: ["bg-blue-500/80", "bg-indigo-500/80", "bg-sky-500/80", "bg-cyan-500/80"],
        lessons: [
        {
            title: "Μάθημα 1.1",
            name: "Países, Verbo SER/ESTAR & Casa",
            content: {
                verbs: [
                {
                    gr: "είμαι",
                    rom: "íme",
                    pt: "ser / estar",
                    c: ["εγώ είμαι", "εσύ είσαι", "αυτός/ή/ό είναι", "εμείς είμαστε", "εσείς είστε", "αυτοί/ές/ά είναι"]
                },
                {
                    gr: "μένω",
                    rom: "méno",
                    pt: "morar / viver"
                },
                {
                    gr: "έχω",
                    rom: "ého",
                    pt: "ter"
                },
                {
                    gr: "δουλεύω",
                    rom: "dhulévo",
                    pt: "trabalhar"
                }
                ],
                nouns: [
                {
                    gr: "μαθητής",
                    rom: "mathitís",
                    pt: "aluno"
                }, {
                    gr: "δάσκαλος",
                    rom: "dháskalos",
                    pt: "professor"
                }, {
                    gr: "εταιρεία",
                    rom: "etería",
                    pt: "empresa"
                }, {
                    gr: "πόλη",
                    rom: "póli",
                    pt: "cidade"
                }, {
                    gr: "φίλος",
                    rom: "fílos",
                    pt: "amigo(a)"
                }, {
                    gr: "καλύτερος φίλος",
                    rom: "kalíteros fílos",
                    pt: "melhor amigo(a)"
                }, {
                    gr: "μαμά",
                    rom: "mamá",
                    pt: "mãe"
                }, {
                    gr: "μητέρα",
                    rom: "mitéra",
                    pt: "mãe"
                }, {
                    gr: "μπαμπάς",
                    rom: "babás",
                    pt: "pai"
                }, {
                    gr: "πατέρας",
                    rom: "patéras",
                    pt: "pai"
                }, {
                    gr: "γιαγιά",
                    rom: "yiayiá",
                    pt: "avó"
                }, {
                    gr: "παππούς",
                    rom: "papús",
                    pt: "avô"
                }, {
                    gr: "γυναίκα",
                    rom: "yinéka",
                    pt: "esposa / mulher"
                }, {
                    gr: "άντρας",
                    rom: "ándras",
                    pt: "esposo / homem"
                }, {
                    gr: "κόρη",
                    rom: "kóri",
                    pt: "filha"
                }, {
                    gr: "γιος",
                    rom: "yios",
                    pt: "filho"
                }, {
                    gr: "γάτα",
                    rom: "gháta",
                    pt: "gato(a)"
                }, {
                    gr: "σκύλος",
                    rom: "skílos",
                    pt: "cachorro(a)"
                }, {
                    gr: "δωμάτιο",
                    rom: "dhomátio",
                    pt: "cômodo"
                }, {
                    gr: "υπνοδωμάτιο",
                    rom: "ipnodhomátio",
                    pt: "quarto"
                }, {
                    gr: "μπάνιο",
                    rom: "bánio",
                    pt: "banheiro"
                }, {
                    gr: "σαλόνι",
                    rom: "salóni",

        if (!el.length) {
            const any = speechVoices.find(v => /greek|ελλην/i.test(v.name || ''));
            return any || null;
        }
        const pref = /Natural|Neural|Premium|Enhanced|Google|Microsoft|Stefanos|Melina|Nikos/i;

    function cleanForSpeech(t) {

        .replace(/&quot;/g, ' ')

        for (const t of pt.split(' ')) {

    function grPart(s) {
        s = (s || '');
        return (s.indexOf('=') !== -1) ? s.split('=')[0].trim() : s;
    }
    function esc(s) {
        return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    let practiceState = {

    function cleanWord(s) {
        return (s || '').replace(/\([^)]*\)/g, '').trim();
    }
    function normGr(s) {
        return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/ς/g, 'σ').replace(/[^α-ωa-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
    }
    function shuffle(a) {
        return a.slice().sort(() => 0.5 - Math.random());
    }
    function sample(arr, n) {
        return shuffle(arr).slice(0, n);
    }
    function buildVocabPool(content) {
        let raw = [];
        ['nouns', 'adjectives', 'verbs', 'adverbs'].forEach(k => {
            if (content[k])
                raw.push(...content[k]);
        });
        let pool = [];
        raw.forEach(item => {
            let gr = cleanWord((item.gr || '').split('/')[0]);
            let pt = cleanWord((item.pt || '').split('/')[0]);
            let rom = (item.rom || '').split('/')[0].trim();
            if (gr && pt && gr.length > 1)
                pool.push({
                    gr: gr,
                    pt: pt,
                    rom: rom
                });
        });
        const seen = new Set();
        return pool.filter(x => !seen.has(x.gr) && seen.add(x.gr));
    }
    // helpers de frases (reutilizados em lição e unidade)
    function makeTranslate(p, vocab) {
        let answer = p.gr.split(/\s+/).filter(Boolean);
        let dist = sample(vocab.filter(v => !answer.map(w => normGr(w)).includes(normGr(v.gr))), 3).map(x => x.gr.split(/\s+/)[0]);
        return {
            type: 'translateGr',
            gr: p.gr,
            pt: p.pt,
            rom: p.rom || '',
            answer: answer,
            pool: shuffle([...answer, ...dist])
        };
    }
    function makeFill(p, vocab) {
        let words = p.gr.split(/\s+/).filter(Boolean);
        if (words.length < 3)
            return null;
        let gi = 1 + Math.floor(Math.random() * (words.length - 1));
        let correct = words[gi];
        let o = [correct, ...sample(vocab.filter(v => normGr(v.gr) !== normGr(correct)), 3).map(x => x.gr.split(/\s+/)[0])];
        return {
            type: 'fillBlank',
            gr: p.gr,
            pt: p.pt,
            words: words,
            gapIndex: gi,
            answer: correct,
            options: shuffle(o)
        };
    }
    function makeListenSentence(p, allPhrases) {
        let others = sample(allPhrases.filter(x => x.pt !== p.pt), 3).map(x => x.pt);
        return {
            type: 'listenSentence',
            gr: p.gr,
            pt: p.pt,
            options: shuffle([p.pt, ...others])
        };
    }
    function generateActivitiesForLesson(u, l) {
        const lesson = courseData[u].lessons[l];
        const content = lesson.content;
        let vocab = buildVocabPool(content);
        let phrases = (lesson.phrases || []).filter(p => p.gr.split(/\s+/).length >= 2);
        if (vocab.length < 4)
            return [];
        let acts = [];
        acts.push({
            type: 'memory',
            pairs: sample(vocab, 3)
        });
        acts.push({
            type: 'match',
            pairs: sample(vocab, 4)
        });
        sample(vocab, 2).forEach(it => {
            let o = [it.pt, ...sample(vocab.filter(x => x.pt !== it.pt), 3).map(x => x.pt)];
            acts.push({
                type: 'choosePt',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 2).forEach(it => {
            let o = [it.gr, ...sample(vocab.filter(x => x.gr !== it.gr), 3).map(x => x.gr)];
            acts.push({
                type: 'chooseGr',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 2).forEach(it => {
            let o = [it.gr, ...sample(vocab.filter(x => x.gr !== it.gr), 3).map(x => x.gr)];
            acts.push({
                type: 'listen',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 2).forEach(it => acts.push({
            type: 'repeat',
            item: it
        }));
        sample(vocab, 2).forEach(it => acts.push({
            type: 'typeGr',
            item: it
        }));
        // === FRASES (sorteadas, diferentes a cada prática) ===
        shuffle(phrases).slice(0, 8).forEach(p => acts.push(makeTranslate(p, vocab)));
        shuffle(phrases).slice(0, 6).forEach(p => {
            let fb = makeFill(p, vocab);
            if (fb)
                acts.push(fb);
        });
        if (phrases.length >= 4)
            shuffle(phrases).slice(0, 3).forEach(p => acts.push(makeListenSentence(p, phrases)));
        // === TEXTO CURTO ===
        (lesson.texts || []).forEach(t => acts.push({
            type: 'miniText',
            gr: t.gr,
            rom: t.rom || '',
            pt: t.pt
        }));
        return shuffle(acts);
    }
    function generateActivitiesForUnit(u) {
        const lessons = courseData[u].lessons;
        let vocab = [];
        lessons.forEach(l => vocab.push(...buildVocabPool(l.content)));
        const seen = new Set();
        vocab = vocab.filter(x => !seen.has(x.gr) && seen.add(x.gr));
        if (vocab.length < 4)
            return [];
        let acts = [];
        acts.push({
            type: 'memory',
            pairs: sample(vocab, 3)
        });
        acts.push({
            type: 'match',
            pairs: sample(vocab, 4)
        });
        sample(vocab, 3).forEach(it => {
            let o = [it.pt, ...sample(vocab.filter(x => x.pt !== it.pt), 3).map(x => x.pt)];
            acts.push({
                type: 'choosePt',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 3).forEach(it => {
            let o = [it.gr, ...sample(vocab.filter(x => x.gr !== it.gr), 3).map(x => x.gr)];
            acts.push({
                type: 'chooseGr',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 3).forEach(it => {
            let o = [it.gr, ...sample(vocab.filter(x => x.gr !== it.gr), 3).map(x => x.gr)];
            acts.push({
                type: 'listen',
                item: it,
                options: shuffle(o)
            });
        });
        sample(vocab, 3).forEach(it => acts.push({
            type: 'typeGr',
            item: it
        }));
        sample(vocab, 2).forEach(it => acts.push({
            type: 'repeat',
            item: it
        }));
        let phrases = [];
        lessons.forEach(l => {
            (l.phrases || []).forEach(p => {
                if (p.gr.split(/\s+/).length >= 2)
                    phrases.push(p);
            });
        });
        shuffle(phrases).slice(0, 12).forEach(p => acts.push(makeTranslate(p, vocab)));
        shuffle(phrases).slice(0, 8).forEach(p => {
            let fb = makeFill(p, vocab);
            if (fb)
                acts.push(fb);
        });
        if (phrases.length >= 4)
            shuffle(phrases).slice(0, 4).forEach(p => acts.push(makeListenSentence(p, phrases)));
        let texts = [];
        lessons.forEach(l => {
            (l.texts || []).forEach(t => texts.push(t));
        });
        sample(texts, Math.min(3, texts.length)).forEach(t => acts.push({
            type: 'miniText',
            gr: t.gr,
            rom: t.rom || '',
            pt: t.pt
        }));
        return shuffle(acts);
    }

        if (card.lang === 'gr')
            window.playAudio(card.text, null);

            el: el,
            data: card
        });
        if (practiceState.matchSelection.length === 2) {
            practiceState.isChecking = true;

            if (f.data.pairId === s.data.pairId && f.data.lang !== s.data.lang) {

        container.appendChild(g);
        if (audioGr)
            setTimeout(() => window.playAudio(audioGr, null), 350);
    }
    function renderType(a, container) {
        const it = a.item;
        const box = document.createElement('div');
        box.className = 'w-full max-w-xl mx-auto flex flex-col items-center gap-5 mt-2';
        box.innerHTML = `<div class="w-full p-6 md:p-8 bg-white/60 border rounded-[2rem] shadow-sm text-center" style="border-color:var(--line)">
              <p class="text-[10px] uppercase tracking-widest font-bold mb-1" style="color:var(--terra)">Em português</p>
              <div class="text-2xl md:text-3xl font-extrabold tracking-tight leading-snug" style="color:var(--aegean-deep)">${it.pt}</div>
            </div>
            <p class="text-sm font-medium" style="color:var(--olive)">Digite a palavra em grego ${it.rom ? `(leitura: <span class="rom">${it.rom}</span>)` : ''}</p>`;
        const wrap = document.createElement('div');
        wrap.className = 'w-full max-w-md';
        wrap.innerHTML = `<input id="typeInput" type="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Γράψε στα ελληνικά…" class="w-full px-5 py-4 text-lg md:text-2xl font-bold text-center font-greek bg-white/90 border rounded-2xl shadow-inner focus:outline-none" style="border-color:var(--line); color:var(--aegean-deep)">`;
        box.appendChild(wrap);
        container.appendChild(box);
        const inp = wrap.querySelector('#typeInput');
        inp.addEventListener('input', () => enableCheckButton(inp.value.trim().length > 0));
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const b = document.getElementById('btnCheck');
                if (!b.disabled)
                    checkAnswer();
            }
        });
        setTimeout(() => {
            try {
                inp.focus();
            } catch (e) {}
        }, 200);
        enableCheckButton(false);
    }
    function renderRepeat(a, container) {
        const it = a.item;
        const box = document.createElement('div');
        box.className = 'w-full max-w-xl mx-auto flex flex-col items-center gap-5 mt-2';
        box.innerHTML = `<div class="w-32 h-32 rounded-[2rem] flex items-center justify-center text-white" style="background:linear-gradient(160deg,var(--aegean),var(--aegean-deep)); box-shadow:0 15px 30px rgba(22,59,90,.3)"><i data-lucide="${wordIcon(it)}" class="w-16 h-16"></i></div>
            <div class="text-center"><div class="text-3xl md:text-4xl font-extrabold font-greek tracking-tight" style="color:var(--aegean-deep)">${it.gr}</div>
            ${it.rom ? `<p class="rom text-lg mt-1">[${it.rom}]</p>` : ''}
            <p class="font-semibold text-lg mt-1 uppercase tracking-wide" style="color:var(--olive)">${it.pt}</p></div>
            <button onclick="window.playAudio('${esc(it.gr)}', event)" class="practice-btn practice-btn-primary px-6 py-3 rounded-2xl font-bold flex items-center gap-2"><i data-lucide="volume-2" class="w-5 h-5 text-white"></i><span class="text-white">Ouvir</span></button>
            <p class="text-sm font-medium flex items-center gap-2" style="color:var(--olive)"><i data-lucide="mic" class="w-4 h-4"></i> Ouça e repita em voz alta</p>`;
        container.appendChild(box);
        enableCheckButton(true);
        setTimeout(() => window.playAudio(it.gr, null), 350);
    }
    function renderQuiz(a, container) {
        practiceState.listenSelection = null;
        const box = document.createElement('div');
        box.className = 'w-full max-w-2xl mx-auto p-6 md:p-8 bg-white/60 border rounded-[2rem] shadow-sm mb-8 text-center';
        box.style.borderColor = 'var(--line)';
        box.innerHTML = `<div class="text-xl md:text-2xl font-extrabold tracking-tight leading-snug" style="color:var(--aegean-deep)">${a.q}</div>`;
        container.appendChild(box);
        const g = document.createElement('div');
        g.className = 'flex flex-col gap-3 w-full max-w-xl mx-auto';
        a.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'practice-card w-full text-left p-4 md:p-5 rounded-2xl text-base md:text-lg font-bold flex items-center gap-4';
            b.style.color = 'var(--ink)';
            b.innerHTML = `<div class="w-6 h-6 rounded-full border-2 flex-shrink-0" style="border-color:rgba(31,94,139,.4)"></div><span class="leading-tight">${opt}</span>`;
            b.onclick = () => {
                selectOption(g, b, opt);
                practiceState.listenSelection = opt;
            };
            g.appendChild(b);
        });
        container.appendChild(g);
    }
    function selectOption(group, btn, opt) {
        if (practiceState.isChecking)
            return;
        Array.from(group.children).forEach(c => {
            c.classList.remove('selected');
            const d = c.querySelector('div');
            if (d) {
                d.style.background = '';
                d.style.borderColor = 'rgba(31,94,139,.4)';
            }
        });
        btn.classList.add('selected');
        const r = btn.querySelector('div');
        if (r) {
            r.style.background = 'var(--aegean)';
            r.style.borderColor = 'var(--aegean)';
        }
        enableCheckButton(true);
    }
    function renderTranslateGr(a, container) {
        const box = document.createElement('div');
        box.className = 'w-full max-w-2xl mx-auto p-5 md:p-6 bg-white/60 border rounded-[2rem] shadow-sm mb-8 text-center';
        box.style.borderColor = 'var(--line)';
        box.innerHTML = `<p class="text-[10px] uppercase tracking-widest font-bold mb-1" style="color:var(--terra)">Em português</p><div class="text-xl md:text-2xl font-extrabold tracking-tight leading-snug" style="color:var(--aegean-deep)">${a.pt}</div>`;
        container.appendChild(box);
        const dz = document.createElement('div');
        dz.id = 'dropZone';
        dz.className = 'drop-zone flex flex-wrap gap-2 w-full max-w-2xl mx-auto mb-10 justify-center';
        container.appendChild(dz);
        const pz = document.createElement('div');
        pz.className = 'flex flex-wrap justify-center gap-2.5 w-full max-w-2xl mx-auto';
        a.pool.forEach((word, index) => {
            const b = document.createElement('button');
            b.className = 'word-block rounded-xl py-2.5 px-5 text-base md:text-lg font-bold font-greek';
            b.style.color = 'var(--ink)';
            b.innerText = word;
            b.id = 'word-' + index;
            b.onclick = () => {
                if (practiceState.isChecking)
                    return;
                const c = b.cloneNode(true);
                c.id = 'clone-' + index;
                c.onclick = () => {
                    if (practiceState.isChecking)
                        return;
                    c.remove();
                    b.classList.remove('used');
                    updateDropCheck();
                };
                dz.appendChild(c);
                b.classList.add('used');
                window.playAudio(word, null);
                updateDropCheck();
            };
            pz.appendChild(b);
        });
        container.appendChild(pz);
        updateDropCheck();
    }
    function updateDropCheck() {
        enableCheckButton(document.getElementById('dropZone').children.length > 0);
    }
    function renderFillBlank(a, container) {
        practiceState.listenSelection = null;
        const sentence = a.words.map((w, i) => i === a.gapIndex ? `<span id="gapSlot" class="inline-block min-w-[70px] px-3 py-1 mx-1 border-b-2 border-dashed font-greek" style="border-color:var(--aegean); color:var(--aegean)">____</span>` : `<span class="font-greek">${w}</span>`).join(' ');
        const box = document.createElement('div');
        box.className = 'w-full max-w-2xl mx-auto p-6 md:p-8 bg-white/60 border rounded-[2rem] shadow-sm mb-8 text-center';
        box.style.borderColor = 'var(--line)';
        box.innerHTML = `<p class="text-[10px] uppercase tracking-widest font-bold mb-3" style="color:var(--terra)">${a.pt}</p><div class="text-xl md:text-2xl font-extrabold tracking-tight leading-relaxed" style="color:var(--aegean-deep)">${sentence}</div>`;
        container.appendChild(box);
        const g = document.createElement('div');
        g.className = 'grid grid-cols-2 gap-3 w-full max-w-xl mx-auto';
        a.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'practice-card w-full text-center p-4 rounded-2xl text-base md:text-lg font-bold font-greek';
            b.style.color = 'var(--ink)';
            b.innerText = opt;
            b.onclick = () => {
                if (practiceState.isChecking)
                    return;
                Array.from(g.children).forEach(c => c.classList.remove('selected'));
                b.classList.add('selected');
                practiceState.listenSelection = opt;
                const s = document.getElementById('gapSlot');
                if (s)
                    s.innerText = opt;
                window.playAudio(opt, null);
                enableCheckButton(true);
            };
            g.appendChild(b);
        });
        container.appendChild(g);
    }
    function enableCheckButton(en) {
        document.getElementById('btnCheck').disabled = !en;
    }
    function checkAnswer() {
        if (practiceState.isChecking) {
            practiceState.currentIndex++;
            loadActivity();
            return;
        }
        const a = practiceState.activities[practiceState.currentIndex];
        let ok = false,
            correct = '',
            audio = '';
        if (a.type === 'translateGr') {
            const dz = document.getElementById('dropZone');
            const uw = Array.from(dz.children).map(b => b.innerText.trim());
            ok = normGr(uw.join(' ')) === normGr(a.answer.join(' '));
            correct = a.gr;
            audio = a.gr;
        }
        else if (a.type === 'fillBlank') {
            ok = normGr(practiceState.listenSelection || '') === normGr(a.answer);
            correct = a.gr;
            audio = a.gr;
        }
        else if (a.type === 'typeGr') {
            const inp = document.getElementById('typeInput');
            ok = normGr(inp ? inp.value : '') === normGr(a.item.gr);
            correct = a.item.gr + (a.item.rom ? ' [' + a.item.rom + ']' : '');
            audio = a.item.gr;
        }
        else if (a.type === 'listen' || a.type === 'chooseGr') {
            ok = practiceState.listenSelection === a.item.gr;
            correct = a.item.gr;
            audio = a.item.gr;
        }
        else if (a.type === 'choosePt') {
            ok = practiceState.listenSelection === a.item.pt;
            correct = a.item.pt;
            audio = a.item.gr;
        }
        else if (a.type === 'listenSentence') {
            ok = practiceState.listenSelection === a.pt;
            correct = a.pt;
            audio = a.gr;
        }
        else if (a.type === 'quiz') {
            ok = practiceState.listenSelection === a.answer;
            correct = a.answer + ' — ' + a.explain;
        }
        else if (a.type === 'repeat' || a.type === 'miniText') {
            ok = true;
            correct = '';
            audio = '';
        } /* só ouvir: nunca conta como erro */
        else if (a.type === 'match' || a.type === 'memory')
            return;
        practiceState.isChecking = true;
        if (!ok)
            loseHeart();
        if (audio)
            window.playAudio(audio, null);
        showFeedback(ok, correct);
    }
    function skipActivity() {
        if (practiceState.isChecking)
            return;
        const a = practiceState.activities[practiceState.currentIndex];
        if (a.type === 'repeat' || a.type === 'miniText') {
            practiceState.isChecking = true;
            showFeedback(true);
            return;
        }
        practiceState.isChecking = true;
        loseHeart();
        let c = '';
        if (a.type === 'choosePt')
            c = a.item.pt;
        else if (a.type === 'quiz')
            c = a.answer + ' — ' + a.explain;
        else if (a.item)
            c = a.item.gr;
        else if (a.gr)
            c = a.gr;
        if (a.type === 'match')
            c = 'Associe todas as palavras.';
        if (a.type === 'memory')
            c = 'Encontre todos os pares.';
        showFeedback(false, c);
    }
    function loseHeart() {
        practiceState.hearts--;
        document.getElementById('heartsCount').innerText = Math.max(0, practiceState.hearts);
        if (practiceState.hearts <= 0) {
            setTimeout(() => {
                alert('Você ficou sem vidas! (Tente novamente.)');
                practiceState.currentIndex = practiceState.activities.length;
                closePractice();
            }, 500);
        }
    }
    function showFeedback(ok, correct='') {
        const fa = document.getElementById('feedbackArea'),
            ft = document.getElementById('feedbackTitle'),
            fx = document.getElementById('feedbackText'),
            fi = document.getElementById('feedbackIcon'),
            bc = document.getElementById('btnCheck'),
            bs = document.getElementById('btnSkip');
        bs.classList.add('hidden');
        bc.innerText = 'Continuar';
        bc.classList.remove('practice-btn-primary');
        bc.disabled = false;
        if (ok) {
            fa.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up border-t';
            fa.style.background = 'rgba(16,185,129,.14)';
            fa.style.borderColor = '#10b981';
            fa.style.color = '#065f46';
            fi.className = 'w-14 h-14 rounded-full flex items-center justify-center text-white shadow-md shrink-0';
            fi.style.background = '#10b981';
            fi.innerHTML = '<i data-lucide="check" class="w-8 h-8"></i>';
            ft.innerText = ['Τέλεια!', 'Μπράβο!', 'Πολύ καλά!', 'Σωστά!', 'Υπέροχα!'][Math.floor(Math.random() * 5)];
            fx.classList.add('hidden');
            bc.classList.add('practice-btn-success');
            bc.classList.remove('practice-btn-danger');
        }
        else {
            fa.className = 'absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up border-t';
            fa.style.background = 'rgba(225,29,72,.12)';
            fa.style.borderColor = '#e11d48';
            fa.style.color = '#7f1d1d';
            fi.className = 'w-14 h-14 rounded-full flex items-center justify-center text-white shadow-md shrink-0';
            fi.style.background = '#e11d48';
            fi.innerHTML = '<i data-lucide="x" class="w-8 h-8"></i>';
            ft.innerText = 'Resposta correta:';
            fx.innerText = correct;
            fx.classList.remove('hidden');
            bc.classList.add('practice-btn-danger');
            bc.classList.remove('practice-btn-success');
        }
        fa.classList.remove('hidden');
        lucide.createIcons();
    }
    function resetFooter() {
        const fa = document.getElementById('feedbackArea'),
            bc = document.getElementById('btnCheck'),
            bs = document.getElementById('btnSkip');
        fa.classList.add('hidden');
        fa.className = 'hidden absolute left-0 bottom-full w-full p-4 md:px-8 py-6 flex flex-col slide-up';
        fa.style.background = '';
        fa.style.color = '';
        bs.classList.remove('hidden');
        bc.innerText = 'Verificar';
        bc.classList.remove('practice-btn-danger', 'practice-btn-success');
        bc.classList.add('practice-btn-primary');
        bc.onclick = checkAnswer;
        enableCheckButton(false);
    }
    function showVictory() {
        const container = document.getElementById('activityContainer');
        document.getElementById('activityTitle').innerText = '';
        document.getElementById('practiceProgress').style.width = '100%';
        document.getElementById('feedbackArea').classList.add('hidden');
        document.getElementById('btnSkip').classList.add('hidden');
        container.innerHTML = `<div class="flex flex-col items-center justify-center text-center mt-12">
            <div class="w-32 h-32 rounded-full flex items-center justify-center border-4 border-white mb-8" style="background:linear-gradient(160deg,var(--gold),#d8b65a); box-shadow:0 15px 35px rgba(176,141,46,.4)"><i data-lucide="crown" class="w-16 h-16 text-white" style="fill:#fff"></i></div>
            <h2 class="text-3xl md:text-4xl font-extrabold font-greek mb-3 tracking-tight" style="color:var(--aegean-deep)">Μπράβο! Concluído!</h2>
            <p class="text-lg font-bold uppercase tracking-widest" style="color:var(--olive)">+10 XP</p></div>`;
        lucide.createIcons();
        const bc = document.getElementById('btnCheck');
        bc.innerText = 'Concluir';
        bc.classList.add('practice-btn-success');
        bc.classList.remove('practice-btn-primary', 'practice-btn-danger');
        bc.disabled = false;
        bc.onclick = () => {
            closePractice();
            bc.onclick = checkAnswer;
        };
    }
    // STARTUP
    document.addEventListener('DOMContentLoaded', function() {
        finalizeCourse();
        render();
    });
    </script>
</body>
</html>
